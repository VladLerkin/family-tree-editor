name: Android Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Android Debug APK
        run: |
          ./gradlew :app-android:assembleDebug --stacktrace
      
      - name: Setup and Build Android Release
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          # Use secrets if available, otherwise use dummy defaults
          # But if KEYSTORE_BASE64 is missing, we MUST use dummy passwords regardless
          SEC_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          SEC_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SEC_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No KEYSTORE_BASE64 found. Using DUMMY mode."
            export RELEASE_STORE_PASSWORD="android123"
            export RELEASE_KEY_ALIAS="release"
            export RELEASE_KEY_PASSWORD="android123"
            
            echo "Generating dummy Keystore..."
            keytool -genkey -v -keystore app-android/release.keystore \
              -alias "$RELEASE_KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$RELEASE_STORE_PASSWORD" \
              -keypass "$RELEASE_KEY_PASSWORD" \
              -dname "CN=Dummy, OU=Dummy, O=Dummy, L=Dummy, ST=Dummy, C=US"
          else
            echo "KEYSTORE_BASE64 found. Using SECRETS mode."
            echo "$KEYSTORE_BASE64" | base64 -d > app-android/release.keystore
            export RELEASE_STORE_PASSWORD="$SEC_STORE_PASSWORD"
            export RELEASE_KEY_ALIAS="$SEC_KEY_ALIAS"
            export RELEASE_KEY_PASSWORD="$SEC_KEY_PASSWORD"
          fi
          
          echo "Starting Gradle build..."
          ./gradlew :app-android:assembleRelease --stacktrace
        continue-on-error: true
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app-android/build/outputs/apk/debug/*.apk
          retention-days: 7
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-release-apk
          path: app-android/build/outputs/apk/release/*.apk
          retention-days: 30
      
      - name: Run Android Tests
        run: |
          ./gradlew :app-android:testDebugUnitTest --stacktrace
        continue-on-error: true
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: app-android/build/test-results/**
          retention-days: 7
